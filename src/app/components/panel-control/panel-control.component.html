<div class="panel-container">
  <nav class="navbar">
    <div class="nav-logo" (click)="goHome()">
      <span class="logo-icon">✂</span>
      <span class="logo-text">Barbería - Panel</span>
    </div>
    <div class="nav-links desktop-only">
      <button class="nav-btn-outline" (click)="goHome()">🏠 Inicio</button>
      <button class="nav-btn-outline" (click)="logout()">Cerrar Sesión</button>
    </div>
    <button class="hamburger-btn mobile-only" (click)="toggleMobileMenu(); $event.stopPropagation()">
      @if (mobileMenuOpen) {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      }
    </button>
    @if (mobileMenuOpen) {
      <div class="mobile-menu" (click)="$event.stopPropagation()">
        <button class="mobile-menu-btn" (click)="goHome()">🏠 Inicio</button>
        <button class="mobile-menu-btn" (click)="logout()">Cerrar Sesión</button>
      </div>
    }
  </nav>

  <div class="panel-content">
    @if (userInfo && userInfo.username) {
      <p class="welcome-message">Bienvenido, {{ userInfo.username }}</p>
    }
    <div class="dashboard">
      <div class="card" (click)="goToBookingSearch()">
        <div class="card-icon">📅</div>
        <h3>Calendario de Citas</h3>
        <p class="card-subtitle">(Citas Hoy)</p>
        <p class="card-value">{{ bookingsCount }}</p>
      </div>
      <div class="card" (click)="goToClients()">
        <div class="card-icon">👥</div>
        <h3>Clientes</h3>
        <p class="card-value">{{ clientsCount }}</p>
      </div>
      <div class="card" (click)="goToUsers()">
        <div class="card-icon">👤</div>
        <h3>Usuarios</h3>
        <p class="card-value">{{ usersCount }}</p>
      </div>
      <div class="card" (click)="goToWorkSchedule()">
        <div class="card-icon">🕐</div>
        <h3>Horario de Trabajo</h3>
        <p class="card-value">-config</p>
      </div>
      <div class="card" (click)="goToServices()">
        <div class="card-icon">✂️</div>
        <h3>Servicios</h3>
        <p class="card-value">-config</p>
      </div>
      </div>
  </div>
</div>
